# ── Terminal & Environment ────────────────────────────────────────────────────
# tmux-256color es el terminfo propio de tmux. El override RGB le dice que
# el terminal externo (Ghostty) soporta color de 24 bits.
set -g  default-terminal "tmux-256color"
set -sa terminal-overrides ",xterm-ghostty:RGB"
# Permite que Ctrl+Shift+<key> y similares pasen correctamente.
set -s  extended-keys on
# OSC 52: permite que aplicaciones dentro de tmux escriban al clipboard del sistema.
set -g  set-clipboard on

# ── General ───────────────────────────────────────────────────────────────────
set -g  mouse on
set -g  base-index 1           # Ventanas desde 1 (alineado con el teclado)
set -g  pane-base-index 1      # Paneles desde 1
set -g  renumber-windows on    # Renumerar al cerrar ventanas
set -g  set-titles on
set -g  set-titles-string "#S / #W"
set -g  detach-on-destroy off  # Al cerrar una sesión, cambiar a otra en vez de salir

# ── Prefix: C-Space ───────────────────────────────────────────────────────────
# C-b es incómodo. C-a conflictúa con readline. C-Space es ergonómico y sin conflictos.
unbind C-b
set -g  prefix C-Space
bind    C-Space send-prefix

# ── Keybindings ───────────────────────────────────────────────────────────────
# Recargar configuración
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Splits intuitivos — abre en el directorio actual del panel
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
bind '"' split-window -v -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"

# Nueva ventana en el directorio actual
bind c new-window -c "#{pane_current_path}"

# Navegación de paneles (vim)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize de paneles (vim, -r = repetible sin re-presionar prefix)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Navegación de ventanas (repetible)
bind -r C-p previous-window
bind -r C-n next-window

# Mover ventanas (repetible, mantiene el foco en la ventana movida)
bind -r < swap-window -t -1\; select-window -t -1
bind -r > swap-window -t +1\; select-window -t +1

# ── Copy Mode (vi) ────────────────────────────────────────────────────────────
set -g  mode-keys vi
bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y   send-keys -X copy-selection-and-cancel

# ── Theme: Catppuccin (instalación manual) ────────────────────────────────────
# Mantener manual siguiendo la recomendación oficial del repo de Catppuccin.
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "basic"
set -g @catppuccin_window_flags "icon"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
# "none" = transparente, se integra con la opacidad de Ghostty.
# "basic" en vez de "rounded" porque los separadores redondeados necesitan
# un color de fondo real para la transición, incompatible con "none".
set -g @catppuccin_status_background "none"

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# ── Status Line ───────────────────────────────────────────────────────────────
# Módulos #{E:@catppuccin_status_*} manejan separadores, colores e iconos
# automáticamente. Solo hora en date_time, y git branch inline.
set -g @catppuccin_date_time_text " %H:%M"

set -g status-left-length  100
set -g status-right-length 100
set -g status-left  ""
set -g status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_git_branch}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

# ── Plugins (TPM) ─────────────────────────────────────────────────────────────
# tmux-sensible  — escape-time 0, history 50k, focus-events on, aggressive-resize
# tmux-yank      — clipboard del sistema en copy mode (usa wl-copy en Wayland)
# tmux-resurrect — prefix+Ctrl-s guardar / prefix+Ctrl-r restaurar sesiones
# tmux-continuum — auto-save cada 15min + auto-restore al iniciar tmux
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'

# DEBE ser la última línea
run '~/.tmux/plugins/tpm/tpm'
