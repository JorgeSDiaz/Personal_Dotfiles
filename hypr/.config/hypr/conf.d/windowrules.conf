# Window rules, workspace rules, layer rules.
# Docs: https://wiki.hyprland.org/Configuring/Window-Rules/

# ──────────────────────────────────────────────────────────────
# Regla estrella: flotar CUALQUIER ventana secundaria de los
# navegadores objetivo (popup de extensión, OAuth/SSO en ventana
# nueva, login de NordPass, etc.). El truco negative: excluye la
# ventana principal por su título, flotando todo lo demás.
# Patrón idiomático de JaKooLit/Hyprland-Dots.
# ──────────────────────────────────────────────────────────────

# Zen (Firefox fork, Wayland-native → class = "zen")
windowrule = match:class ^(zen)$, match:title negative:(.*— Zen Browser|.*Zen Browser), float on
windowrule = match:class ^(zen)$, match:title negative:(.*— Zen Browser|.*Zen Browser), center on
windowrule = match:class ^(zen)$, match:title negative:(.*— Zen Browser|.*Zen Browser), size 960 720

# Brave
windowrule = match:class ^(brave-browser|Brave-browser)(-beta|-dev|-nightly)?$, match:title negative:(.*Brave|.*Brave-browser), float on
windowrule = match:class ^(brave-browser|Brave-browser)(-beta|-dev|-nightly)?$, match:title negative:(.*Brave|.*Brave-browser), center on
windowrule = match:class ^(brave-browser|Brave-browser)(-beta|-dev|-nightly)?$, match:title negative:(.*Brave|.*Brave-browser), size 960 720

# Chrome / Chromium
windowrule = match:class ^(google-chrome|Google-chrome|chromium|Chromium)$, match:title negative:(.*Google Chrome|.*Chromium), float on
windowrule = match:class ^(google-chrome|Google-chrome|chromium|Chromium)$, match:title negative:(.*Google Chrome|.*Chromium), center on
windowrule = match:class ^(google-chrome|Google-chrome|chromium|Chromium)$, match:title negative:(.*Google Chrome|.*Chromium), size 960 720

# ──────────────────────────────────────────────────────────────
# Diálogos del sistema y XDG Desktop Portal
# ──────────────────────────────────────────────────────────────

windowrule = match:class ^(xdg-desktop-portal-gtk)$, float on, center on
windowrule = match:class ^(org\.freedesktop\.impl\.portal\.desktop\..*)$, float on, center on

# initial_title: captura file pickers que cambian de título al abrirse
windowrule = match:initial_title ^(Open File|Open Files|Save As|Save File|Save|File Upload|Choose Files|Choose File)$, float on, center on
windowrule = match:initial_title ^(Open File|Open Files|Save As|Save File|Save|File Upload|Choose Files|Choose File)$, size 900 600

# Polkit (agente de autenticación gráfica)
windowrule = match:class ^(org\.kde\.polkit-kde-authentication-agent-1|polkit-gnome-authentication-agent-1)$, float on, center on

# Progreso de operaciones de archivo
windowrule = match:title ^(File Operation Progress)$, float on, center on

# ──────────────────────────────────────────────────────────────
# Picture-in-Picture — flotante, anclado, esquina inferior derecha
# ──────────────────────────────────────────────────────────────
windowrule = match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$, float on
windowrule = match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$, pin on
windowrule = match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$, keep_aspect_ratio on
windowrule = match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$, size 480 270
windowrule = match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$, move 72% 72%

# ──────────────────────────────────────────────────────────────
# WebRTC screen-sharing indicator (Chrome/Brave/Meet/Zoom)
# ──────────────────────────────────────────────────────────────
windowrule = match:title .*is sharing (a window|your screen).*, float on
windowrule = match:title .*is sharing (a window|your screen).*, pin on
